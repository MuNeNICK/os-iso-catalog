name: Daily Checks

on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC daily
  workflow_dispatch:

concurrency:
  group: daily-check
  cancel-in-progress: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  eol-check:
    runs-on: ubuntu-latest
    outputs:
      eol_changed: ${{ steps.eol.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check EOL dates
        id: eol
        run: |
          python scripts/check_eol.py && EXIT_CODE=0 || EXIT_CODE=$?
          if [ $EXIT_CODE -eq 2 ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif [ $EXIT_CODE -ne 0 ]; then
            exit $EXIT_CODE
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit EOL status changes
        if: steps.eol.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/images.yaml
          git commit -m "chore: auto-update EOL statuses"
          git push

  link-check:
    runs-on: ubuntu-latest
    needs: eol-check
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check links
        id: links
        continue-on-error: true
        run: python scripts/check_links.py 2>&1 | tee link-report.txt

      - name: Create issue for broken links
        if: steps.links.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('link-report.txt', 'utf8');
            const today = new Date().toISOString().split('T')[0];

            // Check for existing open issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'broken-link',
              state: 'open',
            });

            if (issues.data.length > 0) {
              // Update existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: `## Update: ${today}\n\n\`\`\`\n${report}\n\`\`\``,
              });
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Broken links detected - ${today}`,
                body: `## Link Check Report\n\n\`\`\`\n${report}\n\`\`\`\n\nThis issue was automatically created by the daily link checker.`,
                labels: ['broken-link', 'automated'],
              });
            }

  new-release-check:
    runs-on: ubuntu-latest
    needs: eol-check
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check for new releases
        id: newrel
        continue-on-error: true
        run: python scripts/check_new_releases.py 2>&1 | tee new-release-report.txt

      - name: Create issue for new releases
        if: steps.newrel.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('new-release-report.txt', 'utf8');
            const today = new Date().toISOString().split('T')[0];

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'new-release',
              state: 'open',
            });

            if (issues.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: `## Update: ${today}\n\n\`\`\`\n${report}\n\`\`\``,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `New OS releases detected - ${today}`,
                body: `## New Release Report\n\n\`\`\`\n${report}\n\`\`\`\n\nPlease add these to \`data/images.yaml\` with download URLs and checksums.`,
                labels: ['new-release', 'automated'],
              });
            }

  auto-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run auto-update
        id: update
        run: |
          python scripts/auto_update.py && EXIT_CODE=0 || EXIT_CODE=$?
          if [ $EXIT_CODE -eq 2 ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif [ $EXIT_CODE -ne 0 ]; then
            exit $EXIT_CODE
          fi

      - name: Regenerate JSON
        if: steps.update.outputs.changed == 'true'
        run: python scripts/generate.py

      - name: Read report
        if: steps.update.outputs.changed == 'true'
        id: report
        run: |
          {
            echo 'content<<ENDOFREPORT'
            cat auto-update-report.txt
            echo 'ENDOFREPORT'
          } >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "feat: auto-update OS image catalog"
          title: "Auto-update: OS image catalog"
          body: |
            ## Auto-update Report

            ```
            ${{ steps.report.outputs.content }}
            ```

            This PR was automatically generated by the daily auto-update workflow.
          branch: auto-update
          labels: automated,auto-update
          delete-branch: true

  regenerate:
    needs: eol-check
    if: needs.eol-check.outputs.eol_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Regenerate JSON
        run: python scripts/generate.py

      - name: Commit regenerated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: regenerate JSON after EOL status update"
          git push
